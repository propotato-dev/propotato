<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProPotato AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; }
        .container { display: flex; height: 100vh; }
        .sidebar { width: 250px; background: #0d0d0d; border-right: 1px solid #333; padding: 20px; overflow-y: auto; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .chat-area { flex: 1; overflow-y: auto; padding: 20px; }
        .message { margin: 10px 0; padding: 10px; border-radius: 8px; }
        .user { background: #0066cc; margin-left: 40px; }
        .assistant { background: #333; margin-right: 40px; }
        .input-area { padding: 20px; border-top: 1px solid #333; display: flex; gap: 10px; }
        textarea { flex: 1; padding: 10px; background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; }
        button { padding: 10px 20px; background: #0066cc; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0052a3; }
    </style>
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2>ProPotato AI</h2>
            <button onclick="newChat()">New Chat</button>
            <div id="chatList"></div>
        </div>
        <div class="main">
            <div class="chat-area" id="chatArea"></div>
            <div class="input-area">
                <textarea id="ta" placeholder="Type your message..."></textarea>
                <button id="sendBtn" onclick="handleSend()">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentId = null;
        let chats = {};
        let isGenerating = false;
        let abortCtrl = null;
        let settings = {};

        async function newChat() {
            const res = await fetch('/api/chats/new', { method: 'POST' });
            const data = await res.json();
            currentId = data.chat_id;
            chats[currentId] = { messages: [], title: 'New Chat' };
            renderMessages();
            loadChats();
        }

        async function handleSend() {
            if (isGenerating) { abortCtrl?.abort(); return; }
            const ta = document.getElementById('ta');
            const text = ta.value.trim();
            if (!text) return;
            ta.value = '';
            const btn = document.getElementById('sendBtn');
            btn.textContent = '■';
            btn.disabled = false;
            isGenerating = true;
            if (!currentId) newChat();
            const id = currentId;
            chats[id].messages.push({ role: 'user', content: text });
            chats[id].messages.push({ role: 'assistant', content: '...' });
            renderMessages();
            
            try {
                const resp = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, chat_id: id }),
                    signal: abortCtrl?.signal
                });
                if (!resp.ok) throw new Error('API error ' + resp.status);
                const reader = resp.body.getReader();
                const dec = new TextDecoder();
                let acc = '';
                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    const chunk = dec.decode(value);
                    acc += chunk;
                    chats[id].messages[chats[id].messages.length - 1] = { role: 'assistant', content: acc };
                    renderMessages();
                }
            } catch (e) {
                chats[id].messages[chats[id].messages.length - 1] = { role: 'assistant', content: '[Error: ' + e.message + ']' };
            }
            isGenerating = false;
            btn.textContent = 'Send';
            renderMessages();
        }

        function renderMessages() {
            const area = document.getElementById('chatArea');
            if (!currentId || !chats[currentId]) { area.innerHTML = ''; return; }
            area.innerHTML = chats[currentId].messages.map(m => 
                `<div class="message ${m.role}">${m.content}</div>`
            ).join('');
            area.scrollTop = area.scrollHeight;
        }

        async function loadChats() {
            const res = await fetch('/api/chats');
            const data = await res.json();
            const list = document.getElementById('chatList');
            list.innerHTML = data.chats.map(c => 
                `<div onclick="loadChat('${c.id}')" style="padding:10px;cursor:pointer;border-radius:4px;margin:5px 0;background:#222;">${c.title}</div>`
            ).join('');
        }

        async function loadChat(id) {
            currentId = id;
            const res = await fetch('/api/chats/load', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: id })
            });
            const data = await res.json();
            chats[id] = { messages: data.history, title: 'Chat' };
            renderMessages();
        }

        window.onload = () => {
            loadChats();
            if (Object.keys(chats).length === 0) newChat();
        };
    </script>
</body>
</html>
